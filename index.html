<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex & Neha's Wedding</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            font-family: 'Poppins', sans-serif;
            width: 100%; height: 100%;
            overflow: hidden; 
            background: #fdfaf1;
        }

        /* --- ELEGANT EMERALD & IVORY THEME --- */
        .main-container {
            position: relative;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #f5e6d3 0%, #ffffff 50%, #e0c9a6 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
        }

        /* THE VIBRANT FLORAL FRAME (The "Window") */
        .main-container::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('image_075a07.jpg'); 
            background-size: 100% 100%;
            background-position: center;
            z-index: 20;
            pointer-events: none;
        }

        #bloom-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        #back-btn {
            position: fixed; top: 35px; left: 35px;
            width: 45px; height: 45px; border-radius: 50%;
            background: #12372a; color: #d4af37;
            display: none; align-items: center; justify-content: center;
            font-size: 1.5rem; backdrop-filter: blur(5px);
            cursor: pointer; z-index: 1000; border: 2px solid #d4af37;
        }

        .page {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 50px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.8s ease; z-index: 10;
        }
        .page.active { opacity: 1; visibility: visible; }

        h1 { 
            font-family: 'Dancing Script', cursive; 
            font-size: clamp(3.2rem, 10vw, 4.8rem); 
            color: #12372a;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }
        
        .huge-text { 
            font-size: clamp(4.5rem, 13vw, 7rem); 
            color: #12372a;
            font-weight: 800; margin: 15px 0;
        }

        p { color: #436850; font-weight: 400; letter-spacing: 1px; }

        /* --- FIXED HANGING BUTTON --- */
        .hang-btn {
            opacity: 0;
            visibility: hidden;
            background: linear-gradient(45deg, #12372a, #436850);
            color: #fbfada; border: 1px solid #d4af37; padding: 16px 36px;
            font-size: 1rem; font-weight: 600;
            border-radius: 5px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-top: 50px;
            transform-origin: top center;
            z-index: 25;
            transition: opacity 0.5s ease;
        }

        /* Class added by JavaScript to trigger appearance */
        .hang-btn.show {
            opacity: 1;
            visibility: visible;
            animation: flyIn 0.8s ease-out forwards, swing 3.5s ease-in-out infinite;
        }

        @keyframes flyIn { 0% { transform: translateY(40px); } 100% { transform: translateY(0); } }
        @keyframes swing { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

        .face-circle {
            width: clamp(120px, 28vw, 170px); height: clamp(120px, 28vw, 170px);
            border-radius: 50%; border: 4px solid #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-size: cover; background-position: center;
            margin-bottom: 15px;
        }
        .face-alex { background-image: url('ALEX_Animated.png'); }
        .face-neha { background-image: url('NEHA_Animated.png'); }

        .couple-animation { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .heart { font-size: 2.5rem; color: #ff1744; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .details-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px; border-radius: 10px; 
            max-width: 480px; width: 92%; text-align: left;
            border: 1px solid #d4af37;
            color: #12372a;
            z-index: 25;
            overflow-y: scroll;
            -ms-overflow-style: none; scrollbar-width: none;
        }
        .details-card::-webkit-scrollbar { display: none; }

        .detail-row { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f2e8cf; }
        .detail-row strong { color: #12372a; display: block; font-size: 1.1rem; }
        .parent-info { font-size: 0.85rem; color: #436850; font-style: italic; display: block; }
        .time-tag { font-size: 0.9rem; color: #aa771c; font-weight: 700; }

        .map-link {
            display: block; width: 100%; background: #12372a; 
            color: #fbfada; padding: 14px; 
            border: 1px solid #d4af37; border-radius: 4px;
            text-align: center; text-decoration: none;
            margin-top: 15px; font-weight: 600; font-size: 0.9rem;
        }

        /* --- Simplified Contact Tab --- */
        .contact-tab {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: #12372a; color: #fbfada; padding: 15px; text-align: center;
            border-top: 2px solid #d4af37;
            z-index: 30; cursor: pointer; 
            transition: transform 0.4s ease;
            transform: translateY(calc(100% - 45px));
        }
        .contact-tab.open { transform: translateY(0); }
        .contact-handle { font-weight: 600; display: block; margin-bottom: 10px; font-size: 0.9rem; color: #d4af37; }
        .contact-content { display: none; padding: 10px 0; border-top: 1px solid rgba(212, 175, 55, 0.3); }
        .contact-tab.open .contact-content { display: block; }
        .contact-item { font-size: 0.95rem; margin: 8px 0; }
    </style>
</head>
<body>

                <div><div class="face-circle face-neha"></div><p style="font-weight:600">Neha</p></div>

            <button class="hang-btn" onclick="goToPage('page-when')">The Date 📅</button>

            <p style="letter-spacing: 5px;">SAVE THE DAY</p>
            <h1 class="huge-text">MAY 24</h1>
            <p style="font-size: 1.5rem; color: #12372a;">2026</p>
            <button class="hang-btn" onclick="goToPage('page-where')">The Place 📍</button>
        </section>

            <p style="letter-spacing: 3px; margin
