<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alex & Neha — Wedding Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lobster+Two:ital,wght@1,700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:  #0a1d16; /* Deep Emerald/Navy Hybrid */
      --gold:  #C9A46E;
      --gsub:  rgba(201,164,110,0.30);
      --cream: #EDE0CF;
      --soft:  rgba(237,224,207,0.84);
      --muted: rgba(237,224,207,0.72);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      background: var(--navy);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    .bg { 
        position: fixed; inset: 0; z-index: 0;
        background: radial-gradient(circle at center, #12372a 0%, #0a1d16 100%);
    }

    #petal-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

    /* ── NAVIGATION ── */
    .page-dots {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px; z-index: 200;
    }
    .dot {
      height: 6px; border-radius: 3px; cursor: pointer;
      width: 6px; background: rgba(201,164,110,0.22);
      transition: width .4s ease, background .4s ease;
    }
    .dot.active { width: 22px; background: var(--gold); }

    #back-btn {
      position: fixed; top: 14px; left: 18px;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--gsub); color: var(--gold); 
      display: none; align-items: center; justify-content: center; 
      z-index: 200; cursor: pointer;
    }
    #back-btn.visible { display: flex; }

    /* ── PAGE TRANSITIONS ── */
    .page {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 68px 28px; z-index: 10;
      opacity: 0; visibility: hidden;
      transform: translateX(40px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .page.active {
      opacity: 1; visibility: visible;
      transform: translateX(0);
    }

    /* ── BUTTON STYLE ── */
    .btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem; font-weight: 600; letter-spacing: 3px;
      color: var(--gold); background: transparent;
      border: 1px solid var(--gsub); padding: 14px 30px;
      cursor: pointer; margin-top: 30px; text-transform: uppercase;
      opacity: 0;
    }
    /* Button appears after 1.5s delay on active page */
    .page.active .btn {
      animation: fadeUpBtn 0.8s ease forwards 1.5s;
    }

    @keyframes fadeUpBtn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── CONTENT STYLES ── */
    .couple-name {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: clamp(2.5rem, 10vw, 3.8rem);
      color: var(--cream); margin: 15px 0;
    }
    .huge-text { font-family: 'Cormorant Garamond', serif; font-size: 6rem; color: var(--gold); line-height: 1; }
    .gold-line { width: 60px; height: 1px; background: var(--gold); margin: 15px auto; opacity: 0.5; }

    /* ── PHOTO POP EFFECT ── */
    .photo-wrap { width: min(350px, 85vw); }
    .frame {
      border: 1px solid var(--gold); padding: 8px;
      background: rgba(255,255,255,0.03);
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      opacity: 0; transform: scale(0.9);
    }
    .page.active .frame {
      animation: popEffect 0.8s cubic-bezier(0.26, 0.53, 0.74, 1.48) forwards 0.3s;
    }
    @keyframes popEffect {
      to { opacity: 1; transform: scale(1); }
    }
    .frame img { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; border: 1px solid rgba(201,164,110,0.3); }

    /* ── DETAILS CARD ── */
    .details-scroll { width: 100%; max-width: 450px; overflow-y: auto; scrollbar-width: none; }
    .details-scroll::-webkit-scrollbar { display: none; }
    .dcard {
      border: 1px solid var(--gsub); background: rgba(255,255,255,0.02);
      padding: 20px; margin-bottom: 10px; text-align: center;
    }
    .dcard-label { font-size: 0.6rem; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }
