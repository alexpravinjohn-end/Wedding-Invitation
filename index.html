<style>
/* --- OTHER STYLES REMAIN THE SAME --- */

/* --- Updated Avatar/Face Styling --- */
.face-circle {
    /* Define the size of the circle */
    width: clamp(100px, 20vw, 150px); /* Responsive sizing: min 100px, max 150px */
    height: clamp(100px, 20vw, 150px);
    
    /* This rule creates the "round crop" display effect */
    border-radius: 50%;
    
    /* Adds the frame and shadow */
    border: 4px solid white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    
    /* Ensures the square image fills the circle without stretching */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    
    margin: 0 auto 15px; /* Centers the circle and adds bottom spacing */
}

/* Link the specific image files */
.face-alex {
    background-image: url('alex.png'); /* Groom's file */
}

.face-neha {
    background-image: url('neha.png'); /* Bride's file */
}

.couple-animation {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(15px, 4vw, 30px);
    margin-bottom: 40px;
    width: 100%;
}

.person-label {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-weight: 600;
    color: #d6336c;
}

/* --- OTHER STYLES (heart, animations, buttons) REMAIN THE SAME --- */
</style>

<body>
<section id="page-greeting" class="page active">
        <p style="margin-bottom: 25px;">You are warmly invited to celebrate with</p>
        
        <div class="couple-animation">
            <div class="person-left">
                <div class="face-circle face-alex"></div>
                <div class="person-label">Alex</div>
            </div>
            
            <div class="heart">❤️</div>
            
            <div class="person-right">
                <div class="face-circle face-neha"></div>
                <div class="person-label">Neha</div>
            </div>
        </div>

        <button class="btn-bottom-right delay-btn" onclick="goToPage('page-when')">When? 📅</button>
    </section>

</body>
