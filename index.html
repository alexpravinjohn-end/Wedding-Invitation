<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex & Neha's Wedding</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            font-family: 'Poppins', sans-serif;
            width: 100%; height: 100%;
            overflow: hidden; 
            background: #fff;
        }

        /* --- DAYTIME WINDOW THEME --- */
        .main-container {
            position: relative;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, #7f7fd5 0%, #86a8e7 50%, #91eae4 100%);
            /* The Vine Window Frame */
            border: 12px solid transparent;
            border-image: url('https://www.transparentpng.com/download/floral/flower-floral-design-vines-png-15.png') 40 round;
            box-shadow: inset 0 0 40px rgba(46, 125, 50, 0.2);
            display: flex; justify-content: center; align-items: center;
            z-index: 1;
        }

        /* Cloud Background */
        .main-container::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparentpng.com/download/clouds/vector-soft-clouds-png-5.png');
            background-size: 80%; background-position: center 10%;
            background-repeat: no-repeat; opacity: 0.25; z-index: -1;
        }

        #bloom-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        #back-btn {
            position: fixed; top: 25px; left: 25px;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.8); color: #2e7d32;
            display: none; align-items: center; justify-content: center;
            font-size: 1.2rem; backdrop-filter: blur(5px);
            cursor: pointer; z-index: 1000; border: 1.5px solid #a5d6a7;
        }

        .page {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 30px;
            opacity: 0; visibility: hidden;
            transition: opacity 0.8s ease; z-index: 10;
        }
        .page.active { opacity: 1; visibility: visible; }

        h1 { 
            font-family: 'Dancing Script', cursive; 
            font-size: clamp(2.8rem, 9vw, 4rem); 
            color: #1b5e20; 
            text-shadow: 1px 1px 2px rgba(255,255,255,0.9);
        }
        
        .huge-text { 
            font-size: clamp(4rem, 12vw, 6rem); color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            font-weight: 800; margin: 10px 0;
        }

        .hang-btn {
            display: none;
            background: linear-gradient(45deg, #2e7d32, #66bb6a);
            color: white; border: none; padding: 12px 30px;
            font-size: 1rem; font-weight: 600;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            margin-top: 30px;
            animation: flyIn 0.8s ease-out forwards, swing 3.5s ease-in-out infinite;
            transform-origin: top center;
        }

        @keyframes flyIn { 0% { transform: translateY(40px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes swing { 0%, 100% { transform: rotate(-2.5deg); } 50% { transform: rotate(2.5deg); } }

        .face-circle {
            width: clamp(100px, 24vw, 150px); height: clamp(100px, 24vw, 150px);
            border-radius: 50%; border: 5px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background-size: cover; background-position: center;
            margin-bottom: 8px;
        }
        .face-alex { background-image: url('ALEX_Animated.png'); }
        .face-neha { background-image: url('NEHA_Animated.png'); }

        .couple-animation { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .heart { font-size: 2rem; color: #ff1744; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .details-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px; border-radius: 18px; 
            max-width: 420px; width: 90%; text-align: left;
            border: 1px solid #a5d6a7;
        }
        .detail-row { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .detail-row strong { color: #2e7d32; display: block; font-size: 0.9rem; }
        .parent-info { font-size: 0.75rem; color: #666; font-style: italic; }
        .time-tag { font-size: 0.85rem; color: #f9a825; font-weight: 600; }

        .map-link {
            display: block; width: 100%; background: #2e7d32; 
            color: #fff; padding: 12px; border-radius: 10px; 
            text-align: center; text-decoration: none;
            margin-top: 8px; font-weight: 600; font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <canvas id="bloom-canvas"></canvas>
        <div id="back-btn" onclick="goBack()">←</div>

        <section id="page-greeting" class="page active">
            <h1>Celestial Union</h1>
            <div class="couple-animation">
                <div><div class="face-circle face-alex"></div><p style="font-weight:600; color:#1b5e20;">Alex</p></div>
                <div class="heart">❤️</div>
                <div><div class="face-circle face-neha"></div><p style="font-weight:600; color:#1b5e20;">Neha</p></div>
            </div>
            <p style="font-size: 0.85rem; color:#1b5e20;">INVITE YOU TO THEIR BIG DAY</p>
            <button class="hang-btn" onclick="goToPage('page-when')">The Date 📅</button>
        </section>

        <section id="page-when" class="page">
            <p style="letter-spacing: 3px; font-size: 0.8rem; color:#1b5e20;">SAVE THE DAY</p>
            <h1 class="huge-text">MAY 24</h1>
            <p style="font-size: 1.1rem; color:#1b5e20;">2026</p>
            <button class="hang-btn" onclick="goToPage('page-where')">The Place 📍</button>
        </section>

        <section id="page-where" class="page">
            <p style="letter-spacing: 1.5px; margin-bottom: 5px; color:#1b5e20;">HOSTED AT</p>
            <h1>Dindigul</h1>
            <p style="color:#1b5e20;">Tamil Nadu, India</p>
            <button class="hang-btn" onclick="goToPage('page-details')">Full Details ✨</button>
        </section>

        <section id="page-details" class="page">
            <div class="details-card">
                <h2 style="text-align:center; color:#2e7d32; margin-bottom:12px; font-family:'Dancing Script'; font-size: 1.8rem;">Wedding Schedule</h2>
                <div class="detail-row"><strong>L Alex Pravin (Groom)</strong><span class="parent-info">Son of A Leo John & S Louis Carolin Mary</span></div>
                <div class="detail-row"><strong>J Neha Lincy (Bride)</strong><span class="parent-info">Daughter of V James & Suguma</span></div>
                <div class="detail-row">
                    <strong>Ceremony <span class="time-tag">@ 10:00 AM
